# This repository ships Docker-based deployment only (no Jupyter notebooks in-tree).
name: Validate Nemotron Voice Agent deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-deployment:
    runs-on: arc-runner-set-oke-org-poc-4-gpu
    timeout-minutes: 480
    env:
      NVIDIA_API_KEY: ${{ secrets.NGC_API_KEY }}
      NGC_API_KEY: ${{ secrets.NGC_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Check Container Status
        run: |
          echo "===================== Container Status ====================="
          docker ps -a

      - name: Prepare .env and NGC login
        run: |
          set -euo pipefail
          cp config/env.example .env
          python3 <<'PY'
          import os
          from pathlib import Path
          key = os.environ.get("NVIDIA_API_KEY", "")
          if not key:
              raise SystemExit("Repository secret NGC_API_KEY is empty or missing")
          p = Path(".env")
          lines = []
          for line in p.read_text().splitlines():
              if line.startswith("NVIDIA_API_KEY="):
                  lines.append(f"NVIDIA_API_KEY={key}")
              else:
                  lines.append(line)
          p.write_text("\n".join(lines) + "\n")
          PY
          echo "${NGC_API_KEY}" | docker login nvcr.io --username '$oauthtoken' --password-stdin

      - name: Deploy stack and validate health
        run: |
          set -euo pipefail

          echo "Starting Nemotron Voice Agent stack (first pull / TRT build can take a long time)..."
          docker compose -f docker-compose.yml up -d --build

          echo "Waiting for UI (host port 9000)..."
          max_retries=120
          retry_count=0
          until curl -fsS "http://127.0.0.1:9000/" > /dev/null 2>&1; do
            retry_count=$((retry_count + 1))
            if [ "$retry_count" -ge "$max_retries" ]; then
              echo "UI did not become ready after $max_retries attempts (~$((max_retries * 10 / 60)) minutes)"
              docker compose -f docker-compose.yml ps
              exit 1
            fi
            echo "Waiting for UI... attempt $retry_count/$max_retries"
            sleep 10
          done
          echo "UI is responding on http://127.0.0.1:9000"

          echo "Waiting for python-app OpenAPI docs (host port 7860)..."
          retry_count=0
          until curl -fsS "http://127.0.0.1:7860/docs" > /dev/null 2>&1; do
            retry_count=$((retry_count + 1))
            if [ "$retry_count" -ge 60 ]; then
              echo "python-app /docs did not become ready in time"
              docker compose -f docker-compose.yml ps
              exit 1
            fi
            echo "Waiting for /docs... attempt $retry_count/60"
            sleep 10
          done
          echo "python-app is healthy (OpenAPI docs reachable)"

      - name: Run Nemotron UI automation tests
        env:
          GITLAB_QA_TOKEN: ${{ secrets.GITLAB_QA_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${GITLAB_QA_TOKEN:-}" ]; then
            echo "Repository secret GITLAB_QA_TOKEN is required to clone GitLab test repo."
            exit 1
          fi

          echo "Cloning QA test repository..."
          git clone --depth 1 --branch khang-dry-run "https://oauth2:${GITLAB_QA_TOKEN}@gitlab-master.nvidia.com/cloud-service-qa/Blueprint/blueprint-github-test.git" qa-tests

          echo "Installing pytest dependencies..."
          python3 -m pip install --upgrade pip
          python3 -m pip install pytest pytest-timeout
          if [ -f qa-tests/requirements.txt ]; then
            python3 -m pip install -r qa-tests/requirements.txt
          fi

          echo "Running UI test marker for Nemotron Voice Agent..."
          cd qa-tests
          python3 -m pytest testcases/nemotron_voice_agent \
            -m "nemotron_voice_agent and ui" \
            --nemotron-voice-agent-url="http://localhost:9000" \
            --disable-warnings -v --timeout=180

      - name: Cleanup Docker resources
        if: always()
        run: |
          echo "Cleaning up workflow resources..."
          docker compose -f docker-compose.yml down --rmi all 2>/dev/null || true
          docker compose -f docker-compose.jetson.yml down --rmi all 2>/dev/null || true
          echo "Docker Compose services stopped"

          sleep 30

          echo "Remaining containers:"
          docker ps -a

          echo "Removing dangling images..."
          docker image prune -f

          echo "Remaining images:"
          docker images

          echo "Workflow cleanup completed"

      - name: Set result output
        id: set_result
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "RESULT=PASS" >> "$GITHUB_OUTPUT"
          else
            echo "RESULT=FAIL" >> "$GITHUB_OUTPUT"
          fi

      # secrets cannot be referenced in step `if:` for some validators / policies; gate via env in bash.
      - name: Detect SMTP configuration
        id: smtp_notify
        if: always()
        env:
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_MAIL_TO: ${{ secrets.SMTP_MAIL_TO }}
          SMTP_MAIL_FROM: ${{ secrets.SMTP_MAIL_FROM }}
        run: |
          if [ -n "$SMTP_USERNAME" ] && [ -n "$SMTP_PASSWORD" ] && [ -n "$SMTP_MAIL_TO" ] && [ -n "$SMTP_MAIL_FROM" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Send mail
        uses: dawidd6/action-send-mail@6e71c855c9a091d80a519621b9fd3e8d252ca40c
        if: ${{ always() && steps.smtp_notify.outputs.enabled == 'true' }}
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "CI workflow result for ${{ github.repository }}"
          to: ${{ secrets.SMTP_MAIL_TO }}
          from: ${{ secrets.SMTP_MAIL_FROM }}
          html_body: |
            <p>Hello,</p>

            <p>The workflow for repository: <strong>${{ github.repository }}</strong> has completed.<br>
            <strong>Result:</strong> ${{ steps.set_result.outputs.RESULT }}</p>

            <p>Run details:<br>
            <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}</a></p>
